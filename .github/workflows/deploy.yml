name: Deploy to GitHub Pages

on:
  # 推送到 main 時部署
  push:
    branches: [main]
  # 手動觸發
  workflow_dispatch:
  # 排程重建：讓「未來日期」的文章到時間後自動上線
  # （靜態站需重新 build 才會產生新文章；每 6 小時重建一次）
  schedule:
    - cron: '0 */6 * * *'

# 提前切到 Node.js 24 執行 JS actions（如 actions/deploy-pages@v4），
# 消除「Node.js 20 actions are deprecated」警告。官方 opt-in 旗標。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# 允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # ── 上線 gate：內部壞連結即讓部署失敗、退回，不上線 ──
      # 比照 evidencetoday 的「Check internal links（fail: true）」，
      # 改用 base-path（/appi.news）感知的檢查（lychee 預設不認 base）。
      - name: Check internal links (hard gate)
        run: pnpm check:links

      # 自訂網域 appi.news 後 base 為根（/），dist 資產為根路徑；暫存到 _site 根目錄，
      # Lighthouse 以 http://localhost/ 稽核（lighthouserc.json 的 url 同步改根）。
      - name: Stage site for Lighthouse
        run: |
          mkdir -p _site
          cp -r dist/. _site/

      # 軟性稽核（不擋部署）：加 timeout-minutes 護欄，避免 Lighthouse 卡死無限期擋住
      # 後面的 Upload artifact 與部署（continue-on-error 只處理「失敗」，不處理「hang」）。
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # staticDistDir 改放 lighthouserc.json 的 ci.collect（此 action 不接受該 input）
          configPath: ./lighthouserc.json
          uploadArtifacts: true
        continue-on-error: true
        timeout-minutes: 5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 部署完成、線上可取得後，才向 IndexNow 推送近期上線/更新的網址，
      # 讓 Bing（含 ChatGPT Search / Copilot）等引擎即時重爬。best-effort，不擋部署。
      - name: Checkout (for IndexNow)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Submit URLs to IndexNow
        run: node scripts/indexnow.mjs
        continue-on-error: true
