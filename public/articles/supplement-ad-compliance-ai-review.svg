  <path d="M0 512h1000" stroke="#c59b47" stroke-width="2" opacity=".8"/>
  <path d="M10 506h200" stroke="#c59b47" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 8" opacity=".9"/>

  <!-- background data map and charts -->
